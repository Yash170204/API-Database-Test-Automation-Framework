[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register test markers to avoid warnings
markers =
    api: Marks tests as API functional tests (regression/smoke)
    database: Marks tests as database direct queries or validations
    integration: Marks tests as API-to-Database consistency validation tests
    smoke: Quick sanity/smoke tests
    regression: Full regression test suite

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/framework.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S
